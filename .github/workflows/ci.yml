name: CI

on:
  pull_request:
  push:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install
        uses: ./
        with:
          jsdom-version: 20.0.3

      - name: Test
        run: cd test && sbt++field scala2 test
